name: PGA/Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install
      working-directory: ./PGA-PI

    - name: Build project
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      working-directory: ./PGA-PI

    # Versionamento Semântico
    - name: Install semver
      run: npm install -g semver

    - name: Create initial tag if not exists
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        if ! git ls-remote --tags origin | grep -q "refs/tags/v0.0.0"; then
          git tag -a v0.0.0 -m "Initial release"
          git push origin v0.0.0
        else
          echo "Tag v0.0.0 já existe no remoto, pulando criação."
        fi

    - name: Calculate and generate new version for main
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git fetch --tags

        # Get last tag
        LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
        if [ -z "$LAST_TAG" ]; then
          LAST_TAG="v0.0.0"
        fi

        echo "Última tag: $LAST_TAG"

        # Get commits since last tag
        COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")

        # Initialize version increment flags
        MAJOR=0
        MINOR=0
        PATCH=0

        # Analyze commit messages
        for COMMIT in "$COMMITS"; do
          if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then
            MAJOR=1
          elif [[ "$COMMIT" == *"feat"* ]]; then
            MINOR=1
          elif [[ "$COMMIT" == *"fix"* ]]; then
            PATCH=1
          fi
        done

        # Calculate new version using semver
        CURRENT_VERSION=${LAST_TAG#v}
        NEW_VERSION=$CURRENT_VERSION

        if [[ $MAJOR -eq 1 ]]; then
          NEW_VERSION=$(semver -i major $CURRENT_VERSION)
        elif [[ $MINOR -eq 1 ]]; then
          NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
        elif [[ $PATCH -eq 1 ]]; then
          NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
        fi

        echo "Nova versão: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

    - name: Calculate and generate new version for develop
      if: github.ref == 'refs/heads/develop'
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git fetch --tags

        # Get last tag
        LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1` 2>/dev/null || echo "v0.0.0")
        
        echo "Última tag: $LAST_TAG"

        # Get current version
        CURRENT_VERSION=${LAST_TAG#v}
        
        # Remove any beta suffix if present
        BASE_VERSION=$(echo $CURRENT_VERSION | sed 's/-beta\.[0-9]*//')
        
        # Get beta version if exists
        BETA_VERSION=$(echo $LAST_TAG | grep -o 'beta\.[0-9]*' | grep -o '[0-9]*' || echo "0")
        
        # Increment beta version
        NEW_BETA_VERSION=$((BETA_VERSION + 1))
        
        # Set new version
        NEW_VERSION="$BASE_VERSION-beta.$NEW_BETA_VERSION"
        
        echo "Nova versão: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

    - name: Update package.json version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && env.new_version != ''
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        if [ "$CURRENT_VERSION" != "${{ env.new_version }}" ]; then
          npm version ${{ env.new_version }} --no-git-tag-version
        else
          echo "Versão já está em $CURRENT_VERSION, não é necessário atualizar."
        fi
      working-directory: ./PGA-PI

    - name: Commit and push new version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && env.new_version != ''
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add PGA-PI/package.json
        git commit -m "chore(release): version ${{ env.new_version }}" || echo "No changes to commit"
        
        # Check if tag already exists before creating
        if git rev-parse "v${{ env.new_version }}" >/dev/null 2>&1; then
          echo "Tag v${{ env.new_version }} already exists, skipping creation."
        else
          git tag v${{ env.new_version }}
          git push origin v${{ env.new_version }}
        fi
        
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          git push origin main
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          git push origin develop
        fi

    # Deploy to GitHub Pages (only for main branch)
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: PGA-PI/dist # Build output folder
        branch: gh-pages # The branch to deploy to
        token: ${{ secrets.GH_TOKEN }} 
        clean: true # Clean the target branch before deploying
        commit-message: "deploy: Release ${{ env.new_version }}"