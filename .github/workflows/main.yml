name: PGA/Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GH_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install
      working-directory: ./PGA-PI

    - name: Build project
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      working-directory: ./PGA-PI

    - name: Build Docker image
      run: docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t pga-frontend:${{ github.sha }} .
      working-directory: ./PGA-PI

    - name: Test Docker image
      run: |
        # Start container
        docker run -d -p 8080:80 --name test-container pga-frontend:${{ github.sha }}
        
        # Wait for container to be ready with retry logic
        echo "Waiting for container to start..."
        for i in {1..30}; do
          if docker ps | grep -q test-container && curl -f http://localhost:8080/health >/dev/null 2>&1; then
            echo "Container is ready!"
            break
          fi
          echo "Attempt $i: Container not ready yet, waiting..."
          sleep 2
        done
        
        # Final health check
        echo "Final health check..."
        curl -f http://localhost:8080/health || {
          echo "Health check failed. Container logs:"
          docker logs test-container
          docker stop test-container
          docker rm test-container
          exit 1
        }
        
        # Test main page
        echo "Testing main page..."
        curl -f http://localhost:8080/ >/dev/null || {
          echo "Main page test failed. Container logs:"
          docker logs test-container
          docker stop test-container
          docker rm test-container
          exit 1
        }
        
        echo "All tests passed!"
        docker stop test-container
        docker rm test-container
      working-directory: ./PGA-PI

    # Versionamento Semântico
    - name: Install semver
      run: npm install -g semver

    - name: Create initial tag if not exists
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        if ! git ls-remote --tags origin | grep -q "refs/tags/v0.0.0"; then
          git tag -a v0.0.0 -m "Initial release"
          git push origin v0.0.0
        else
          echo "Tag v0.0.0 já existe no remoto, pulando criação."
        fi

    - name: Calculate and generate new version for main
      if: github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git fetch --tags

        # Get last tag
        LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
        if [ -z "$LAST_TAG" ]; then
          LAST_TAG="v0.0.0"
        fi

        echo "Última tag: $LAST_TAG"

        # Get commits since last tag
        COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")

        # Initialize version increment flags
        MAJOR=0
        MINOR=0
        PATCH=0

        # Analyze commit messages
        for COMMIT in "$COMMITS"; do
          if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then
            MAJOR=1
          elif [[ "$COMMIT" == *"feat"* ]]; then
            MINOR=1
          elif [[ "$COMMIT" == *"fix"* ]]; then
            PATCH=1
          fi
        done

        # Calculate new version using semver
        CURRENT_VERSION=${LAST_TAG#v}
        NEW_VERSION=$CURRENT_VERSION

        if [[ $MAJOR -eq 1 ]]; then
          NEW_VERSION=$(semver -i major $CURRENT_VERSION)
        elif [[ $MINOR -eq 1 ]]; then
          NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
        elif [[ $PATCH -eq 1 ]]; then
          NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
        fi

        echo "Nova versão: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

    - name: Calculate and generate new version for develop
      if: github.ref == 'refs/heads/develop'
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git fetch --tags

        # Get last tag
        LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1` 2>/dev/null || echo "v0.0.0")
        
        echo "Última tag: $LAST_TAG"

        # Get current version
        CURRENT_VERSION=${LAST_TAG#v}
        
        # Remove any beta suffix if present
        BASE_VERSION=$(echo $CURRENT_VERSION | sed 's/-beta\.[0-9]*//')
        
        # Get beta version if exists
        BETA_VERSION=$(echo $LAST_TAG | grep -o 'beta\.[0-9]*' | grep -o '[0-9]*' || echo "0")
        
        # Increment beta version
        NEW_BETA_VERSION=$((BETA_VERSION + 1))
        
        # Set new version
        NEW_VERSION="$BASE_VERSION-beta.$NEW_BETA_VERSION"
        
        echo "Nova versão: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

    - name: Update package.json version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && env.new_version != ''
      run: |
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        if [ "$CURRENT_VERSION" != "${{ env.new_version }}" ]; then
          npm version ${{ env.new_version }} --no-git-tag-version
        else
          echo "Versão já está em $CURRENT_VERSION, não é necessário atualizar."
        fi
      working-directory: ./PGA-PI

    - name: Commit and push new version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && env.new_version != ''
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add PGA-PI/package.json
        git commit -m "chore(release): version ${{ env.new_version }}" || echo "No changes to commit"
        
        # Check if tag already exists before creating
        if git rev-parse "v${{ env.new_version }}" >/dev/null 2>&1; then
          echo "Tag v${{ env.new_version }} already exists, skipping creation."
        else
          git tag v${{ env.new_version }}
          git push origin v${{ env.new_version }}
        fi
        
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          git push origin main
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          git push origin develop
        fi

    - name: Push Docker image to Docker Hub
      if: github.ref == 'refs/heads/main' && env.new_version != ''
      run: |
        docker tag pga-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/pga-frontend:${{ env.new_version }}
        docker tag pga-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/pga-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/pga-frontend:${{ env.new_version }}
        docker push ${{ secrets.DOCKER_USERNAME }}/pga-frontend:latest

    # Deploy to GitHub Pages (only for main branch)
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: PGA-PI/dist # Build output folder
        branch: gh-pages # The branch to deploy to
        token: ${{ secrets.GH_TOKEN }} 
        clean: true # Clean the target branch before deploying
        commit-message: "deploy: Release ${{ env.new_version }}"

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pgafatec

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.__clientidsecretname__ }}
          tenant-id: ${{ secrets.__tenantidsecretname__ }}
          subscription-id: ${{ secrets.__subscriptionidsecretname__ }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pgafatec'
          slot-name: 'Production'
          package: .
